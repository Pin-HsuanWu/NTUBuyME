services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4100:4000"
      - "8180:8080"
    environment:
      - MONGO_URL=mongodb://mongo:27017/NTUBuyMe
      - JWT_SECRET=dev-secret-key
      - ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - REDIS_URL=redis://redis:6379
      - PORT=4000
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend/src:/app/backend/src

  mongo:
    image: mongo:6
    ports:
      - "27117:27017"
    volumes:
      - ntubuyme-mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6479:6379"

volumes:
  ntubuyme-mongo-data:
